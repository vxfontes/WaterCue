name: WaterCue
options:
  bundleIdPrefix: io.defender360
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  swiftVersion: "5.10"

targets:
  WaterCue:
    type: application
    platform: macOS
    sources:
      - WaterCue
    resources:
      - path: WaterCue/Resources/Assets.xcassets
    info:
      path: WaterCue/Resources/Info.plist
      properties:
        CFBundleDisplayName: WaterCue
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "2"
        LSUIElement: true
        NSCameraUsageDescription: "WaterCue precisa da câmera pra validar fotos do seu copo de água."
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: WaterCue/WaterCue.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.device.camera: true
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_STRICT_CONCURRENCY: minimal
        OTHER_LDFLAGS: "-lsqlite3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  WaterCueTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - WaterCueTests
    dependencies:
      - target: WaterCue
      - sdk: libsqlite3.tbd
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
